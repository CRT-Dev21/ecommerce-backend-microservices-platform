apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-redis
  template:
    metadata:
      labels:
        app: gateway-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--save", "", "--appendonly", "no"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-redis
spec:
  selector:
    app: gateway-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP