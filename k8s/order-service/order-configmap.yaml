apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ecommerce
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://order-db:5432/order_db"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  AUTH_SERVICE_JWKS_URI: "http://auth-service:8081/oauth2/jwks"
  AUTH_SERVICE_TOKEN_URI: "http://auth-service:8081/oauth2/token"
  INVENTORY_SERVICE_URL: "http://inventory-service:8086"