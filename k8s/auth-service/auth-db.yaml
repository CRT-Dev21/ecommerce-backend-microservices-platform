apiVersion: v1
kind: Service
metadata:
  name: auth-db
spec:
  selector:
    app: auth-db-pod
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db-pod
  template:
    metadata:
      labels:
        app: auth-db-pod
    spec:
      containers:
      - name: postgres
        image: postgres:16
        env:
        - name: POSTGRES_DB
          value: "auth_db"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgreuser"
        ports:
        - containerPort: 5432