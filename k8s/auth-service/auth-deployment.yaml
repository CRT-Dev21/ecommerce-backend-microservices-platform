apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service-pod
  template:
    metadata:
      labels:
        app: auth-service-pod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      initContainers:
        - name: download-otel-agent
          image: curlimages/curl:latest
          command:
            - curl
            - -L
            - -o
            - /shared/opentelemetry-javaagent.jar
            - https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar
          volumeMounts:
            - name: otel-agent-volume
              mountPath: /shared

      containers:
      - name: auth-service
        image: ecommerce-backend-microservices-platform-auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: auth-service-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: auth-db-secrets
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-db-secrets
              key: password
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: auth-service-config
              key: SPRING_KAFKA_BOOTSTRAP_SERVERS
        - name: JAVA_TOOL_OPTIONS
          value: "-javaagent:/shared/opentelemetry-javaagent.jar"
        - name: OTEL_SERVICE_NAME
          value: "auth-service"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://tempo.observability.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_LOGS_EXPORTER
          value: "none"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "768Mi"
            cpu: "500m"
        volumeMounts:
          - name: rsa-keys-volume
            mountPath: "/app/certs"
            readOnly: true
          - name: otel-agent-volume
            mountPath: /shared

      volumes:
      - name: rsa-keys-volume
        secret:
          secretName: auth-rsa-keys
      - name: otel-agent-volume
        emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ecommerce
spec:
  selector:
    app: auth-service-pod
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP