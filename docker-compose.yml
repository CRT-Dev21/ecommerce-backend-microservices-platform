services:
  gateway-redis:
    image: redis:7
    container_name: gateway-redis
    ports:
      - "6380:6379"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      gateway-redis:
        condition: service_started
      auth-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_JWKS_URI: "http://auth-service:8081/oauth2/jwks"
      AUTH_SERVICE_URI: "http://auth-service:8081"
      CATALOG_SERVICE_URI: "http://catalog-service:8082"
      SELLER_SERVICE_URI: "http://seller-service:8083"
      PAYMENT_SERVICE_URI: "http://payment-service:8084"
      ORDER_SERVICE_URI: "http://order-service:8085"
      INVENTORY_SERVICE_URI: "http://inventory-service:8086"
      CART_SERVICE_URI: "http://cart-service:8087"
      RAG_SERVICE_URI: "http://rag-service:8089"
      REDIS_HOST: gateway-redis
      REDIS_PORT: 6379

  identity-db:
    image: postgres:16
    container_name: identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgreuser
    ports:
      - "5432:5432"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      identity-db:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://identity-db:5432/identity_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgreuser
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  catalog-db:
    image: mongo:7.0
    container_name: catalog-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongouser
      MONGO_INITDB_DATABASE: products_db
    volumes:
      - ./init/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "10s"

  catalog-redis:
    image: redis:7
    container_name: catalog-redis
    ports:
      - "6379:6379"

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: catalog-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      catalog-db:
        condition: service_healthy
      catalog-redis:
        condition: service_started
      auth-service:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      JAVA_TOOL_OPTIONS: ""
      SPRING_DATA_MONGODB_URI: mongodb://mongo:mongouser@catalog-db:27017/products_db?authSource=admin
      REDIS_HOST: catalog-redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_URI: catalog-redis://catalog-redis:6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8081/oauth2/jwks

  sellers-db:
    image: postgres:16
    container_name: sellers-db
    environment:
      POSTGRES_DB: sellers_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgreuser
    ports:
      - "5433:5432"

  seller-service:
    build:
      context: .
      dockerfile: seller-service/Dockerfile
    container_name: seller-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      sellers-db:
        condition: service_started
      auth-service:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://sellers-db:5432/sellers_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgreuser
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8081/oauth2/jwks

  cart-redis:
    image: redis:7
    container_name: cart
    ports:
      - "6381:6379"

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    container_name: cart-service
    depends_on:
      cart-redis:
        condition: service_started
      auth-service:
        condition: service_started
    ports:
      - "8087:8087"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
      REDIS_HOST: cart-redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_URI: cart-redis://cart-redis:6379
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8081/oauth2/jwks

  inventory-db:
    image: postgres:16
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgreuser
    ports:
      - "5434:5432"

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      inventory-db:
        condition: service_started
      auth-service:
        condition: service_started
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgreuser
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8081/oauth2/jwks

  order-db:
    image: postgres:16
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgreuser
    ports:
      - "5435:5432"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      order-db:
        condition: service_started
      auth-service:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgreuser
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8081/oauth2/jwks
      ORDER_SERVICE_CLIENT_SECRET: order-service-secret
      AUTH_SERVICE_TOKEN_URI: http://auth-service:8080/oauth2/token
      INVENTORY_SERVICE_URL: http://inventory-service:8085

  payment-db:
    image: postgres:16
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgreuser
    ports:
      - "5436:5432"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      payment-db:
        condition: service_started
      auth-service:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgreuser
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8081/oauth2/jwks
      PAYMENT_SERVICE_CLIENT_SECRET: payment-service-secret
      AUTH_SERVICE_TOKEN_URI: http://auth-service:8080/oauth2/token
      SELLER_SERVICE_URL: http://seller-service:8082

  notification-service:
    image: crtdev21/notification-service:v1
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8088:8088"
    environment:
      GMAIL_USERNAME:
      GMAIL_APP_PASSWORD:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - C:\Users\CRT\.ollama:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: [ "CMD", "bash", "-c", "cat /dev/null > /dev/tcp/localhost/6333" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rag-service:
    build:
      context: .
      dockerfile: rag-service/Dockerfile
    container_name: rag-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      auth-service:
        condition: service_started
    ports:
      - "8089:8089"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_VECTORSTORE_QDRANT_HOST: qdrant
      SPRING_AI_VECTORSTORE_QDRANT_PORT: 6334

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost 9092" ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command: >
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.events;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payments.events;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory.events;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic catalog.events;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic sellers.events;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.events.payment-group.dlq;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders.events.inventory-group.dlq;
      "

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092