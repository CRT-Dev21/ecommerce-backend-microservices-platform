server.port=8082
spring.application.name=catalog-service

spring.threads.virtual.enabled=true

mongodb.env.url=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.host=catalog-db
spring.data.mongodb.port=27017
spring.data.mongodb.database=products_db
spring.data.mongodb.username=mongo
spring.data.mongodb.password=mongouser

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.group-id=catalog-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8081/oauth2/jwks}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=1KB

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-thresholds.http.server.requests=50,95,90

management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Configuration for the massive load testing
server.tomcat.max-connections=10000
server.tomcat.accept-count=2000

spring.data.mongodb.additional-settings=maxPoolSize=200&minPoolSize=20&maxWaitTimeMS=5000

spring.data.redis.lettuce.pool.max-active=200
spring.data.redis.lettuce.pool.max-idle=50
spring.data.redis.lettuce.pool.max-wait=5000ms

spring.kafka.producer.batch-size=65536
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.linger-ms=20
spring.kafka.producer.properties.max.block.ms=5000